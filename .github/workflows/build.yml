# .github/workflows/build.yml
# Build the "cloud bundle" the same way the sibling project dutopia/duapi does:
# an ordinary glibc release binary (NOT static musl, NOT a scratch image), bundled
# into cloud/ and published as a downloadable artifact. You copy cloud/ to your
# on-prem OpenShift and run it — no JS/Rust toolchain or dependencies needed there.
#
# Two adaptations vs dutopia: termita uses bun (not npm), and it EMBEDS the Svelte
# frontend into the binary via rust-embed, so the frontend is built BEFORE
# `cargo build --release` and the bundle is just the binary (no separate public/).
#
# The build runs inside the UBI9 image so the binary links against UBI9's glibc and
# is guaranteed to run on UBI9-based OpenShift. checkout/upload run on the host
# (they need Node, which the UBI9 base lacks); only the compile runs in the container.

name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build glibc release binary inside UBI9
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            registry.access.redhat.com/ubi9/ubi:latest \
            bash -euo pipefail -c '
              dnf -y install gcc gcc-c++ make tar gzip xz unzip findutils which >/dev/null

              # Rust (minimal stable toolchain)
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
              source "$HOME/.cargo/env"

              # Bun (glibc build) for the frontend
              curl -fsSL https://bun.sh/install | bash
              export PATH="$HOME/.bun/bin:$PATH"

              # Frontend FIRST — rust-embed bakes web/dist into the release binary
              cd web && bun install --frozen-lockfile && bun run build && cd ..

              # glibc release binary, frontend embedded (compile is the gate)
              cargo build --release

              mkdir -p cloud
              cp target/release/termita cloud/termita
              file cloud/termita
            '

      - name: Add a run note and fix ownership (container writes as root)
        run: |
          sudo chown -R "$USER:$USER" cloud
          cat > cloud/README.txt <<'EOF'
          termita cloud bundle — built on UBI9 (glibc), runs on UBI9-based OpenShift.

          The Svelte frontend is embedded in the binary; this single file is the whole app.
          Run it directly (see the project README "Configuration" for all env vars):

            PORT=3000 HOST=0.0.0.0 ALLOWED_HOSTS=10.0.0.5 ./termita

          Deploy to OpenShift (e.g. the Red Hat Developer Sandbox) with deploy/deploy.sh:
          it uploads this bundle and runs an in-cluster `oc` binary build. See
          deploy/openshift.yaml and deploy/Dockerfile.
          EOF

      - name: Upload the cloud bundle
        uses: actions/upload-artifact@v4
        with:
          name: termita-cloud-ubi9
          path: cloud/**
          if-no-files-found: error
