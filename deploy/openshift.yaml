# deploy/openshift.yaml
# termita on OpenShift via an in-cluster binary build. The GitHub Actions bundle
# (the prebuilt glibc `termita` binary) is uploaded with `oc start-build --from-dir`;
# OpenShift wraps it in a minimal UBI9 image (deploy/Dockerfile — just a COPY, no
# JS/Rust build) and the Deployment rolls out automatically via an image trigger.
#
# Apply + build + roll out with deploy/deploy.sh, or manually:
#   oc apply -f deploy/openshift.yaml
#   oc start-build termita --from-dir=<bundle-dir> --follow   # dir holds termita + Dockerfile
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: termita
  labels:
    app: termita
spec:
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: termita
  labels:
    app: termita
spec:
  # Binary source: builds are driven only by `oc start-build --from-dir`, which
  # uploads the bundle (the `termita` binary + deploy/Dockerfile) as the context.
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: termita:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: termita
  labels:
    app: termita
  annotations:
    # When termita:latest is (re)built, OpenShift rewrites the container image below
    # to the in-cluster ImageStream pullspec and triggers a rollout.
    image.openshift.io/triggers: |
      [{"from":{"kind":"ImageStreamTag","name":"termita:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"termita\")].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: termita
  template:
    metadata:
      labels:
        app: termita
    spec:
      containers:
        - name: termita
          # Placeholder; the image trigger above rewrites this to the resolved
          # ImageStream pullspec once the first build completes.
          image: termita:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            # Restrict which SSH targets are reachable (recommended):
            # - name: ALLOWED_HOSTS
            #   value: "10.0.0.5,10.0.0.6"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 500m
              memory: 128Mi
          # Aligns with OpenShift's default restricted-v2 SCC. No runAsUser:
          # the binary runs fine under the arbitrary UID OpenShift assigns.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: termita
  labels:
    app: termita
spec:
  selector:
    app: termita
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: termita
  labels:
    app: termita
spec:
  to:
    kind: Service
    name: termita
  port:
    targetPort: http
  # Edge TLS: HTTPS/WSS terminates at the router (encrypts the password in transit
  # to the cluster) and redirects plain HTTP to HTTPS.
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
